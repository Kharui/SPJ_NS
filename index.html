<!DOCTYPE html>
<html lang="id" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>SPJ Cam v4.8</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        #cameraView { position: fixed; inset: 0; z-index: 10; display: block; }
        
        /* Optimasi GPU untuk mencegah flicker */
        #video { 
            width: 100%; height: 100%; object-fit: cover; 
            transform: translateZ(0); -webkit-transform: translateZ(0);
        }

        .shutter-btn {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 75px; height: 75px; background: white; border-radius: 50%;
            border: 6px solid rgba(255,255,255,0.3); z-index: 20; cursor: pointer;
        }
        #previewView { 
            display: none; position: fixed; inset: 0; 
            background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(15px); 
            z-index: 100; overflow-y: auto; padding: 20px; 
        }
        .preview-container {
            width: 100%; max-width: 400px; aspect-ratio: 1 / 1; 
            background: #000; display: flex; align-items: center;
            justify-content: center; overflow: hidden; border-radius: 24px;
            margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1);
        }
        #canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
        #loader { display: none; z-index: 400; }
        
        #toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            z-index: 999; width: 90%; max-width: 350px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #toast.show { top: 30px; }

        @media (display-mode: standalone) { #installBanner { display: none !important; } }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="toast" class="bg-red-600 text-white px-6 py-4 rounded-3xl shadow-2xl flex items-center gap-3">
        <svg id="toastIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
        <span id="toastMsg" class="font-bold text-sm tracking-tight leading-tight uppercase">Peringatan</span>
    </div>

    <div id="regModal" class="fixed inset-0 z-[600] bg-slate-900 flex items-center justify-center hidden p-6">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl space-y-6 fade-in">
            <div class="text-center">
                <h2 class="font-black text-2xl uppercase tracking-tighter text-slate-800 italic">Data Kendaraan</h2>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-1">Identitas Laporan</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="regSopir" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-800 uppercase" placeholder="NAMA SOPIR">
                <input type="text" id="regNopol" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-800 uppercase" placeholder="NOMOR POLISI">
            </div>
            <button onclick="saveRegistration()" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-black text-lg shadow-xl active:scale-95 transition-all uppercase tracking-tighter">MULAI</button>
        </div>
    </div>

    <div id="cameraView">
        <video id="video" autoplay playsinline muted></video>
        <button onclick="takePhoto()" class="shutter-btn shadow-2xl"></button>
    </div>

    <div id="previewView" class="flex flex-col items-center">
        <div class="w-full max-w-md">
            <h2 class="text-white text-center font-black text-lg italic uppercase my-4 tracking-tighter">Review Foto</h2>
            <div class="preview-container">
                <canvas id="canvas"></canvas>
            </div>
            <div class="bg-white p-6 rounded-[2.5rem] shadow-2xl space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="rotateManual()" class="bg-amber-500 text-white py-3.5 rounded-2xl font-bold text-sm uppercase">🔄 Putar</button>
                    <button onclick="resetCamera()" class="bg-slate-100 text-slate-500 py-3.5 rounded-2xl font-bold text-sm uppercase">📸 Ulangi</button>
                </div>
                <div class="space-y-3">
                    <input type="text" id="namaProduk" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-800 uppercase" placeholder="NAMA BARANG">
                    <input type="text" id="kotaTujuan" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-800 uppercase" placeholder="TUJUAN">
                </div>
                <button id="btnSubmit" onclick="processUploadAndShare()" class="w-full bg-emerald-600 text-white py-5 rounded-[1.8rem] font-black text-lg shadow-xl active:scale-95 transition-all uppercase tracking-tighter">KIRIM WA & DRIVE</button>
            </div>
        </div>
    </div>

    <div id="loader" class="fixed inset-0 bg-black/80 flex flex-col items-center justify-center">
        <div class="bg-white p-10 rounded-[2.5rem] text-center shadow-2xl">
            <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="font-bold text-slate-800 text-lg uppercase tracking-tight">Mengirim Data...</p>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const cameraView = document.getElementById('cameraView');
        const previewView = document.getElementById('previewView');
        const loader = document.getElementById('loader');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toastMsg');
        const regModal = document.getElementById('regModal');
        
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwg6IBAcPdHH3ybFXNLmfs9U91HmaPamx48Un8L2FLcOuGT_Au2sy48wV-TDQFjgoo1gQ/exec"; 
        
        let photoData = null;
        let isUploaded = false; 
        let userData = { sopir: '', nopol: '' };

        // 1. DETEKSI BLUR (Laplacian Variance)
        function isImageBlurry(cvs) {
            const ctx = cvs.getContext('2d', { alpha: false });
            const imageData = ctx.getImageData(0, 0, cvs.width, cvs.height);
            const pixels = imageData.data;
            const width = imageData.width;
            const height = imageData.height;
            const grayData = new Int32Array(width * height);

            for (let i = 0; i < pixels.length; i += 4) {
                grayData[i / 4] = (pixels[i] + pixels[i + 1] + pixels[i + 2]) / 3;
            }

            let score = 0;
            for (let y = 1; y < height - 1; y += 2) { // Sampling tiap 2 pixel untuk performa
                for (let x = 1; x < width - 1; x += 2) {
                    const idx = y * width + x;
                    const val = (grayData[idx] * 4) - 
                                grayData[idx - 1] - grayData[idx + 1] - 
                                grayData[idx - width] - grayData[idx + width];
                    score += Math.abs(val);
                }
            }
            return (score / (width * height)) < 12; // Threshold adaptif
        }

        function showWarning(msg, isAlert = true) {
            toastMsg.innerText = msg;
            toast.className = `fixed left-50 transform -translate-x-1/2 z-[999] w-[90%] max-w-[350px] transition-all p-4 rounded-3xl shadow-2xl flex items-center gap-3 text-white ${isAlert ? 'bg-red-600' : 'bg-amber-500'}`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3500);
        }

        // 2. KAMERA ADAPTIF (Fokus Perbaikan HP Low-End)
        async function startApp() {
            const constraints = {
                video: { 
                    facingMode: "environment",
                    // Meminta rentang resolusi agar browser bisa menyesuaikan beban RAM
                    width: { min: 640, ideal: 1280, max: 1920 },
                    height: { min: 480, ideal: 720, max: 1080 },
                    frameRate: { ideal: 24, max: 30 } // Batasi FPS agar tidak panas
                }
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                video.onloadedmetadata = () => video.play();
            } catch (err) {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
            }
        }

        function stopApp() {
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
                video.srcObject = null;
            }
        }

        document.addEventListener("visibilitychange", () => {
            if (document.hidden) stopApp();
            else if (cameraView.style.display !== 'none') startApp();
        });

        // 3. PENGAMBILAN GAMBAR HYBRID
        function takePhoto() {
            const context = canvas.getContext('2d', { alpha: false });
            if (video.readyState < 2) return;

            let vW = video.videoWidth;
            let vH = video.videoHeight;

            // Gambar ke canvas dengan rotasi otomatis
            if (vH > vW) {
                canvas.width = vH; canvas.height = vW;
                context.save();
                context.translate(canvas.width / 2, canvas.height / 2);
                context.rotate(-90 * Math.PI / 180); 
                context.drawImage(video, -vW / 2, -vH / 2, vW, vH);
                context.restore();
            } else {
                canvas.width = vW; canvas.height = vH;
                context.drawImage(video, 0, 0, vW, vH);
            }

            // Langsung matikan kamera setelah jepret (Bebaskan RAM)
            stopApp(); 

            // Cek Blur dengan sedikit delay agar CPU stabil
            setTimeout(() => {
                if (isImageBlurry(canvas)) {
                    showWarning("FOTO BURAM! MOHON AMBIL ULANG", false);
                }
            }, 200);

            photoData = canvas.toDataURL('image/jpeg', 0.8); // Kompresi 80% (Ringan & Cukup Tajam)
            cameraView.style.display = 'none';
            previewView.style.display = 'flex';
            isUploaded = false; 
        }

        function resetCamera() {
            cameraView.style.display = 'block';
            previewView.style.display = 'none';
            document.getElementById('namaProduk').value = '';
            document.getElementById('kotaTujuan').value = '';
            isUploaded = false;
            startApp();
        }

        // 4. PROSES KIRIM
        async function processUploadAndShare() {
            const produk = document.getElementById('namaProduk').value.trim().toUpperCase();
            const kota = document.getElementById('kotaTujuan').value.trim().toUpperCase();
            if (!produk || !kota) { showWarning("Isi Nama Barang & Tujuan!"); return; }
            
            loader.style.display = 'flex';
            const now = new Date();
            const tgl = `${String(now.getDate()).padStart(2, '0')}-${String(now.getMonth() + 1).padStart(2, '0')}-${now.getFullYear()}`;
            const formatNama = `${tgl}_${produk}_${kota}_${userData.sopir}_${userData.nopol}`;
            
            if (!isUploaded) {
                fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ image: photoData, name: formatNama }) });
                isUploaded = true;
            }

            setTimeout(async () => {
                try {
                    const blob = await (await fetch(photoData)).blob();
                    const file = new File([blob], `${formatNama}.jpg`, { type: "image/jpeg" });
                    const pesanWA = `${produk} ${kota}`;
                    if (navigator.share && navigator.canShare({ files: [file] })) {
                        await navigator.share({ files: [file], text: pesanWA });
                    } else {
                        window.location.href = `https://wa.me/?text=${encodeURIComponent(pesanWA)}`;
                    }
                } catch (err) { console.log("Share cancel"); }
                finally { loader.style.display = 'none'; }
            }, 800);
        }

        window.addEventListener('load', () => {
            const saved = localStorage.getItem('spj_user_data');
            if (saved) { userData = JSON.parse(saved); startApp(); } 
            else { regModal.classList.remove('hidden'); }
        });

        function saveRegistration() {
            const s = document.getElementById('regSopir').value.trim().toUpperCase();
            const n = document.getElementById('regNopol').value.trim().toUpperCase().replace(/\s+/g, '');
            if (!s || !n) { showWarning("Data belum lengkap!"); return; }
            userData = { sopir: s, nopol: n };
            localStorage.setItem('spj_user_data', JSON.stringify(userData));
            regModal.classList.add('hidden');
            startApp();
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
