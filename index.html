<!DOCTYPE html>
<html lang="id" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>SPJ Cam v4.8</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        #cameraView { position: fixed; inset: 0; z-index: 10; display: block; }
        #video { width: 100%; height: 100%; object-fit: cover; transform: translateZ(0); }
        .shutter-btn {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 75px; height: 75px; background: white; border-radius: 50%;
            border: 6px solid rgba(255,255,255,0.3); z-index: 20; cursor: pointer;
        }
        #previewView { 
            display: none; position: fixed; inset: 0; 
            background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(15px); 
            z-index: 100; overflow-y: auto; padding: 20px; 
        }
        .preview-container {
            width: 100%; max-width: 400px; aspect-ratio: 1 / 1; 
            background: #000; display: flex; align-items: center;
            justify-content: center; overflow: hidden; border-radius: 24px;
            margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1);
        }
        #canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
        #loader { display: none; z-index: 400; }
        
        #toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            z-index: 999; width: 90%; max-width: 350px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #toast.show { top: 30px; }
        
        /* Hilangkan banner jika sudah dalam mode aplikasi terinstall */
        @media (display-mode: standalone) { #installBanner { display: none !important; } }
    </style>
</head>
<body>

    <div id="installBanner" class="fixed top-6 left-4 right-4 z-[300] hidden">
        <div class="bg-white/95 backdrop-blur-md p-4 rounded-3xl shadow-2xl flex items-center justify-between border border-white/20">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-white overflow-hidden">
                    <img src="icon.png" alt="icon" class="w-full h-full object-cover">
                </div>
                <div>
                    <p class="text-[11px] font-black text-slate-800 uppercase tracking-tight leading-none">Instal SPJ Cam</p>
                    <p class="text-[9px] text-slate-500 font-bold mt-1">Akses Cepat & Stabil</p>
                </div>
            </div>
            <button onclick="triggerInstall()" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-black text-[10px] uppercase">PASANG</button>
        </div>
    </div>

    <div id="toast" class="bg-red-600 text-white px-6 py-4 rounded-3xl shadow-2xl flex items-center gap-3">
        <span id="toastMsg" class="font-bold text-sm uppercase">Peringatan</span>
    </div>

    <div id="regModal" class="fixed inset-0 z-[600] bg-slate-900 flex items-center justify-center hidden p-6">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl space-y-6">
            <h2 class="font-black text-2xl text-center uppercase italic">Data Kendaraan</h2>
            <input type="text" id="regSopir" class="w-full p-4 bg-slate-50 rounded-2xl font-bold uppercase" placeholder="NAMA SOPIR">
            <input type="text" id="regNopol" class="w-full p-4 bg-slate-50 rounded-2xl font-bold uppercase" placeholder="NOMOR POLISI">
            <button onclick="saveRegistration()" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-black uppercase">MULAI</button>
        </div>
    </div>

    <div id="cameraView">
        <video id="video" autoplay playsinline muted></video>
        <button onclick="takePhoto()" class="shutter-btn shadow-2xl"></button>
    </div>

    <div id="previewView" class="flex flex-col items-center">
        <div class="w-full max-w-md">
            <div class="preview-container mt-8"><canvas id="canvas"></canvas></div>
            <div class="bg-white p-6 rounded-[2.5rem] space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="rotateManual()" class="bg-amber-500 text-white py-3.5 rounded-2xl font-bold uppercase">🔄 Putar</button>
                    <button onclick="resetCamera()" class="bg-slate-100 text-slate-500 py-3.5 rounded-2xl font-bold uppercase">📸 Ulangi</button>
                </div>
                <input type="text" id="namaProduk" class="w-full p-4 bg-slate-50 rounded-2xl font-bold uppercase" placeholder="NAMA BARANG">
                <input type="text" id="kotaTujuan" class="w-full p-4 bg-slate-50 rounded-2xl font-bold uppercase" placeholder="TUJUAN">
                <button onclick="processUploadAndShare()" class="w-full bg-emerald-600 text-white py-5 rounded-[1.8rem] font-black uppercase">KIRIM LAPORAN</button>
            </div>
        </div>
    </div>

    <div id="loader" class="fixed inset-0 bg-black/80 flex flex-col items-center justify-center">
        <div class="bg-white p-10 rounded-[2.5rem] text-center">
            <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="font-bold uppercase">Mengirim...</p>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const cameraView = document.getElementById('cameraView');
        const previewView = document.getElementById('previewView');
        const loader = document.getElementById('loader');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toastMsg');
        const regModal = document.getElementById('regModal');
        const installBanner = document.getElementById('installBanner');
        
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwg6IBAcPdHH3ybFXNLmfs9U91HmaPamx48Un8L2FLcOuGT_Au2sy48wV-TDQFjgoo1gQ/exec"; 
        
        let photoData = null;
        let deferredPrompt;
        let userData = { sopir: '', nopol: '' };

        // LOGIKA INSTALASI PWA
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.classList.remove('hidden');
        });

        async function triggerInstall() {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') installBanner.classList.add('hidden');
            deferredPrompt = null;
        }

        // KAMERA ADAPTIF (HP LOW-END)
        async function startApp() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "environment",
                        width: { ideal: 1280 }, // Resolusi ideal untuk preview
                        height: { ideal: 720 },
                        frameRate: { ideal: 24 }
                    } 
                });
                video.srcObject = stream;
            } catch (err) {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
            }
        }

        function stopApp() {
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
                video.srcObject = null;
            }
        }

        function takePhoto() {
            const context = canvas.getContext('2d', { alpha: false });
            let vW = video.videoWidth;
            let vH = video.videoHeight;
            canvas.width = (vH > vW) ? vH : vW;
            canvas.height = (vH > vW) ? vW : vH;

            if (vH > vW) {
                context.translate(canvas.width / 2, canvas.height / 2);
                context.rotate(-90 * Math.PI / 180); 
                context.drawImage(video, -vW / 2, -vH / 2, vW, vH);
            } else {
                context.drawImage(video, 0, 0, vW, vH);
            }

            // RAM Release
            stopApp();

            // Peringatan Blur (Threshold 12)
            setTimeout(() => {
                const score = calculateBlur(canvas);
                if (score < 12) showWarning("FOTO BURAM! AMBIL ULANG", false);
            }, 200);

            photoData = canvas.toDataURL('image/jpeg', 0.8);
            cameraView.style.display = 'none';
            previewView.style.display = 'flex';
        }

        function calculateBlur(cvs) {
            const ctx = cvs.getContext('2d');
            const data = ctx.getImageData(0,0,cvs.width,cvs.height).data;
            let score = 0;
            for(let i=4; i<data.length; i+=8) { // Skip pixels for speed
                score += Math.abs(data[i] - data[i-4]);
            }
            return score / (cvs.width * cvs.height);
        }

        function showWarning(msg, isAlert = true) {
            toastMsg.innerText = msg;
            toast.className = `fixed left-50 transform -translate-x-1/2 z-[999] w-[90%] max-w-[350px] transition-all p-4 rounded-3xl text-white ${isAlert ? 'bg-red-600' : 'bg-amber-500'}`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function resetCamera() {
            cameraView.style.display = 'block';
            previewView.style.display = 'none';
            startApp();
        }

        async function processUploadAndShare() {
            const p = document.getElementById('namaProduk').value.trim().toUpperCase();
            const k = document.getElementById('kotaTujuan').value.trim().toUpperCase();
            if (!p || !k) { showWarning("ISI DATA!"); return; }
            loader.style.display = 'flex';
            const name = `LAPORAN_${p}_${k}_${userData.sopir}`;
            fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ image: photoData, name: name }) });
            
            setTimeout(async () => {
                const blob = await (await fetch(photoData)).blob();
                const file = new File([blob], `${name}.jpg`, { type: "image/jpeg" });
                if (navigator.share) await navigator.share({ files: [file], text: `${p} ${k}` });
                loader.style.display = 'none';
            }, 800);
        }

        window.addEventListener('load', () => {
            const saved = localStorage.getItem('spj_user_data');
            if (saved) { userData = JSON.parse(saved); startApp(); } 
            else { regModal.classList.remove('hidden'); }
        });

        function saveRegistration() {
            const s = document.getElementById('regSopir').value.toUpperCase();
            const n = document.getElementById('regNopol').value.toUpperCase();
            if(!s || !n) return;
            userData = { sopir: s, nopol: n };
            localStorage.setItem('spj_user_data', JSON.stringify(userData));
            regModal.classList.add('hidden');
            startApp();
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js?v=4.8');
        }
    </script>
</body>
</html>
